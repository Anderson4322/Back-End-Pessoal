<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="PNG" href="https://img.cdndsgni.com/preview/11908028.jpg">
</head>
<body>

    <div class="container">
   
        <div class="lado-boasvindas">
            <h1>Bem-vindo(a) de volta!</h1>
            <p>Para continuar conectado(a) conosco, faça login com suas informações pessoais.</p>
            <a href="../login/index.html" class="btn-entrar">ENTRAR</a>
        </div>

        <div class="lado-cadastro">
            <form>
                <h1>Criar Conta</h1>
                
                <label>Nome</label>
                <input type="text" id="nome" placeholder="Digite seu nome" required>
                
                <label>Email</label>
                <input type="email" id="email" placeholder="Digite seu email" required>

                <label>Endereço</label>
                
                <input type="text" id="endereco" placeholder="Digite seu endereço" required>

                <label>Telefone</label>
                <input type="tel" id="telefone" placeholder="Digite seu telefone" required>
                
                <label>Senha</label>
                <input type="password" id="senha" placeholder="Digite sua senha" required>

                
                <button type="submit">CADASTRAR</button>
            </form>
        </div>
    </div>

    <script src="./script.js"></script>
</body>
</html>
