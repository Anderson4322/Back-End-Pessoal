<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
   
        <div class="lado-boasvindas">
            <h1>Bem-vindo(a) de volta!</h1>
            <p>Para continuar conectado(a) conosco, faça login com suas informações pessoais.</p>
            <a href="../login/index.html" class="btn-entrar">ENTRAR</a>
        </div>

        <div class="lado-cadastro">
            <form>
                <h1>Criar Conta</h1>
                
                <label>Nome</label>
                <input type="text" id="nome" placeholder="Digite seu nome" required>

           
                
                <label>Email</label>
                <input type="email" id="email" placeholder="Digite seu email" required>
                
                <label>Senha</label>
                <input type="password" id="senha" placeholder="Digite sua senha" required>
                
                <button type="submit">CADASTRAR</button>
            </form>
        </div>
    </div>

     <div id="pai-login">
        
        <form>
        <label for="nome">Nome completo</label>
        <input
          type="text" id="nome"  name="nome" placeholder="Digite seu nome" required>

        <label for="endereco">Endereço</label>
        <input type="text" id="endereco" name="endereco"required/>

        <label for="email">E-mail</label>
        <input id="email" placeholder="seu@email.com" required>

        <label for="senha">Senha</label>
        <input type="password" id="senha" name="senha" placeholder="Digite sua senha"required> 
        
            <label for="tipoConta">Tipo de conta:</label>
        <select name="tipoConta" id="tipoConta">
            <option value="cliente">Cliente</option>
            <option value="profissional">Profissional</option>
        </select>
        

            <button type="submit" id="acessar">Cadastrar</button>
            </form>
            
        </div>

    <script src="./script.js"></script>
</body>
</html>
